            function loadSymbol(sym) {
                const d = dataMap[sym];
                if(!d) return;
                
                // Plot Chart
                const trace = {
                    type: 'bar', orientation: 'h',
                    x: d.records.map(r => r.Volume), y: d.records.map(r => r.Price),
                    marker: { color: d.records.map(r => r.Color), line: {width:0} },
                    text: d.records.map(r => r.HoverText), hoverinfo: 'text'
                };
                const layout = {
                    title: { text: sym + " 籌碼分佈", font: {color:'white', size:20, family:'Microsoft JhengHei'}, x:0.05 },
                    paper_bgcolor: 'black', plot_bgcolor: 'black',
                    margin: { l:50, r:30, t:60, b:30 },
                    xaxis: { showgrid:false, visible:false },
                    yaxis: { showgrid:false, color:'#a0aec0', zeroline:false },
                    shapes: [{ type:'line', y0:d.spotPrice, y1:d.spotPrice, x0:0, x1:1, xref:'paper', line:{color:'#00FF99', width:1, dash:'dash'} }],
                    annotations: [{ x:1, y:d.spotPrice, xref:'paper', text:'現價: '+d.spotPrice.toFixed(2), showarrow:false, xanchor:'right', yanchor:'bottom', font:{color:'#00FF99'} }]
                };
                Plotly.newPlot('chart-div', [trace], layout, {responsive:true, displayModeBar:false});
                
                // --- Logic: Identify Key Levels ---
                const peaks = d.records.filter(r => r.IsPeak);
                
                // 1. Volume-based Top 3
                const supports = peaks.filter(r => r.Price < d.spotPrice).sort((a,b) => b.Volume - a.Volume);
                const resistances = peaks.filter(r => r.Price > d.spotPrice).sort((a,b) => b.Volume - a.Volume);
                
                const labelMap = {};
                
                if(resistances[0]) labelMap[resistances[0].Price.toFixed(2)] = "核心阻力";
                if(resistances[1]) labelMap[resistances[1].Price.toFixed(2)] = "次級阻力";
                if(resistances[2]) labelMap[resistances[2].Price.toFixed(2)] = "一般阻力";
                
                if(supports[0]) labelMap[supports[0].Price.toFixed(2)] = "強力支撐";
                if(supports[1]) labelMap[supports[1].Price.toFixed(2)] = "次級支撐";
                if(supports[2]) labelMap[supports[2].Price.toFixed(2)] = "一般支撐";
                
                // 2. Nearest Price Logic (New Feature)
                // Find nearest Resistance (Price > Spot, lowest price)
                const sortedResByPrice = peaks.filter(r => r.Price > d.spotPrice).sort((a,b) => a.Price - b.Price);
                const nearestRes = sortedResByPrice[0];
                
                // Find nearest Support (Price < Spot, highest price)
                const sortedSuppByPrice = peaks.filter(r => r.Price < d.spotPrice).sort((a,b) => b.Price - a.Price);
                const nearestSupp = sortedSuppByPrice[0];
                
                // Add "Nearest" if not already labeled
                if(nearestRes) {
                    const key = nearestRes.Price.toFixed(2);
                    if(!labelMap[key]) labelMap[key] = "短線阻力";
                }
                
                if(nearestSupp) {
                    const key = nearestSupp.Price.toFixed(2);
                    if(!labelMap[key]) labelMap[key] = "短線支撐";
                }
                
                // --- Render Table ---
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '';
                let spotAdded = false;
                
                d.records.forEach(r => {
                    if(!spotAdded && r.Price < d.spotPrice) { 
                        addRow(tbody, '當前現價', d.spotPrice, '-', 'spot-row', 'type-spot'); 
                        spotAdded=true; 
                    }
                    
                    if(r.IsPeak) {
                        const pKey = r.Price.toFixed(2);
                        const label = labelMap[pKey] || "";
                        
                        let labelClass = 'type-none';
                        if(label.includes('阻力')) labelClass = 'type-res';
                        if(label.includes('支撐')) labelClass = 'type-sup';
                        if(label.includes('短線')) labelClass = 'type-nearest'; // Special color for nearest
                        
                        addRow(tbody, label, r.Price, r.Volume, 'peak-row', labelClass);
                    }
                });
                if(!spotAdded) addRow(tbody, '當前現價', d.spotPrice, '-', 'spot-row', 'type-spot');
            }
            
            function addRow(tbody, type, price, vol, rowClass, typeClass) {
                const tr = document.createElement('tr');
                if(rowClass) tr.className = rowClass;
                tr.innerHTML = `
                    <td class="${typeClass}">${type}</td>
                    <td>${price.toFixed(2)}</td>
                    <td>${typeof vol==='number'?Math.round(vol).toLocaleString():vol}</td>
                `;
                tbody.appendChild(tr);
            }
            loadSymbol('NVDA');
        </script>

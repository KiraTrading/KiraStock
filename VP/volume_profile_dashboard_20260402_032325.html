                document.getElementById('ma60-val').innerText = d.mas.MA60.toFixed(2);
                
                const peaks = d.records.filter(r => r.IsPeak);
                const resistances = peaks.filter(r => r.Price > d.spotPrice).sort((a,b) => b.Volume - a.Volume).slice(0, 5);
                const supports = peaks.filter(r => r.Price < d.spotPrice).sort((a,b) => b.Volume - a.Volume).slice(0, 5);

                text += `⏱️ Time: ${new Date().toLocaleString('zh-HK')}\n`;
                text += `━━━━━━━━━━━━━━━━━━\n`;
                text += `📊 **當前戰況 (SPOT):** ${d.spotPrice.toFixed(2)} 🟢\n\n`;

                let resText = `🎯 **上方阻力區 (空軍防線):**\n`;
                let supText = `\n🛡️ **下方支撐區 (好友防線):**\n`;

                const mas = [
                    {price: d.mas.MA60, label: "MA60 均線"},
                    {price: d.mas.MA20, label: "MA20 均線"},
                    {price: d.mas.MA10, label: "MA10 均線"},
                    {price: d.mas.MA5, label: "MA5 均線"}
                ];

                const allRes = [];
                const allSup = [];

                rows.forEach(row => {
                    const cols = row.querySelectorAll('td');
                    if(cols.length < 2) return;
                    const type = cols[0].innerText;
                    const priceStr = cols[1].innerText;
                    const priceNum = parseFloat(priceStr);
                    
                    if(type.includes('SPOT')) return;

                    let icon = "⚪️";
                    if(type.includes('Core') || type.includes('Strong')) {
                        if(type.includes('Res')) { icon = "📕"; allRes.push({p: priceNum, text: `${icon} ${type}: ${priceStr}`}); }
                        if(type.includes('Sup')) { icon = "📘"; allSup.push({p: priceNum, text: `${icon} ${type}: ${priceStr}`}); }
                    } else {
                        if(type.includes('Res')) { icon = "🔴"; allRes.push({p: priceNum, text: `${icon} ${type}: ${priceStr}`}); }
                        if(type.includes('Sup')) { icon = "🔵"; allSup.push({p: priceNum, text: `${icon} ${type}: ${priceStr}`}); }
                    }
                });

                mas.forEach(m => {
                    if(m.price > 0) {
                        if(m.price > d.spotPrice) allRes.push({p: m.price, text: `📉 ${m.label}: ${m.price.toFixed(2)}`});
                        else allSup.push({p: m.price, text: `📉 ${m.label}: ${m.price.toFixed(2)}`});
                    }
                });

                if (allRes.length > 0) {
                    allRes.sort((a,b) => b.p - a.p).forEach(r => resText += r.text + '\n');
                } else {
                    resText += `➖ 暫無明顯阻力區\n`;
                }

                if (allSup.length > 0) {
                    allSup.sort((a,b) => b.p - a.p).forEach(s => supText += s.text + '\n');
                } else {
                    supText += `➖ 暫無明顯支撐區\n`;
                }

                text += resText + supText;
                text += `━━━━━━━━━━━━━━━━━━\n`;

                // Liquidation Clusters Addition
                if (d.liq_data && (d.liq_data.short_liq.length > 0 || d.liq_data.long_liq.length > 0)) {
                    text += `💣 **大額清算熱區 (Liq Clusters):**\n`;
                    let u_short_liqs = [...new Set(d.liq_data.short_liq.map(x => x.toFixed(2)))].sort((a,b) => b - a);
                    let u_long_liqs = [...new Set(d.liq_data.long_liq.map(x => x.toFixed(2)))].sort((a,b) => b - a);
                    
                    u_short_liqs.forEach(sl => {
                        text += `🪂 向上清算 (空軍爆倉): **${sl}**\n`;
                    });
                    u_long_liqs.forEach(ll => {
                        text += `🩸 向下清算 (多軍爆倉): **${ll}**\n`;
                    });
                    text += `━━━━━━━━━━━━━━━━━━\n`;
                }

                const algoDivs = document.querySelectorAll('.algo-text');
                if(algoDivs.length > 0) {
                     text += `💡 **日內高勝率劇本 (路紙):**\n`;
                     algoDivs.forEach(div => { text += `▫️ ${div.innerText.replace(/\n/g, ' ')}\n`; });
                     text += `━━━━━━━━━━━━━━━━━━\n`;
                }

                text += `🕹️ **自己大位自己睇！**\n`;
                text += `👇 點擊登入 ParisTrader Terminal 查看機構級即時互動圖表\n`;
                text += `https://paristrader-terminal.streamlit.app/?page=%E6%9C%9F%E8%B2%A8%E7%89%9B%E7%86%8A`;

                navigator.clipboard.writeText(text);
                alert('作戰地圖已複製！可以貼到 Telegram 了。');
            }
            
            loadSymbol(currentSym);
        </script>
    </body>
    </html>

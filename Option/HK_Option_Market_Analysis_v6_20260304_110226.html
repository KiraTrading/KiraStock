        const stocksData = fullData.stocks;

            if(Object.keys(stocksData).length === 0) { sel.innerHTML = '<option>No Data</option>'; return; }

                let opt = document.createElement('option'); opt.value = t; opt.innerText = t; sel.appendChild(opt);

        };

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');

            const isGlobal = (tab === 'rank' || tab === 'scanner');
            document.getElementById('tickerSelect').disabled = isGlobal;

            if(!isGlobal) renderTicker(); else renderContent();
        }

        function renderTicker() {
            currentTicker = document.getElementById('tickerSelect').value;
            if (!currentTicker || !stocksData[currentTicker]) return;
            const agg = stocksData[currentTicker].stock_agg;
            const color = agg.change_pct >= 0 ? 'text-success' : 'text-danger';
            document.getElementById('priceDisplay').innerHTML = `<span class="badge bg-light text-dark border fs-6 p-2">Spot: $${agg.price} <span class="${color}">(${agg.change_pct >= 0 ? '+' : ''}${agg.change_pct.toFixed(2)}%)</span></span>`;
            renderContent();
        }

        function renderContent() {
            const c = document.getElementById('contentContainer');
            c.innerHTML = ''; c.scrollTop = 0;

            if (currentTab === 'rank') renderStockRanking(c);
            else if (currentTab === 'scanner') renderMarketScanner(c);
            else if (currentTab === 'analysis') renderAnalysis(c);
            else renderHeatmap(c, currentTab);
        }

            const indicesList = ['HSI', 'HSCEI', 'HSTECH'];
            const indicesData = stockRanking.filter(r => indicesList.includes(r.stock));
            const stocksData = stockRanking.filter(r => !indicesList.includes(r.stock));

            const renderPulse = (row) => {
                if (!row) return '';
                const sentiment = row.net_delta > 0 ? 'Bullish' : 'Bearish';
                const cls = row.net_delta > 0 ? 'pulse-bull' : 'pulse-bear';
                const chgColor = row.change_pct >= 0 ? 'text-success' : 'text-danger';
                return `<div class="col-md-4"><div class="pulse-card ${cls}"><div class="d-flex justify-content-between align-items-center"><h5 class="fw-bold mb-0">${row.stock}</h5><div class="text-end"><span class="badge bg-light text-dark border d-block">$${row.price.toFixed(0)}</span><small class="${chgColor} fw-bold">${row.change_pct>=0?'+':''}${row.change_pct.toFixed(2)}%</small></div></div><div class="mt-3 d-flex justify-content-between"><div class="text-center"><div class="small text-muted">Trend</div><div class="fw-bold ${row.net_delta>0?'text-success':'text-danger'}">${sentiment}</div></div><div class="text-center"><div class="small text-muted">Net Delta</div><div class="fw-bold">${Math.round(row.net_delta/1000).toLocaleString()}k</div></div></div></div></div>`;

            const stockColorMap = {}; let colorIndex = 0;
            const uniqueStocks = [...new Set(list.map(item => item.stock_code))];
            uniqueStocks.slice(0, 5).forEach(s => { stockColorMap[s] = palette[colorIndex % palette.length]; colorIndex++; });

                const sColor = stockColorMap[s.stock_code] || '#f8f9fa';
                return `<tr class="${s.vol_oi_ratio>3?'row-alert-red':'row-alert-yellow'}"><td>${s.ai_note}</td><td><span class="stock-badge" style="background-color: ${sColor};">${s.stock_code}</span></td><td class="small font-monospace">${s.code}</td><td><span class="${s.option_type=='CALL'?'tag-call':'tag-put'}">${s.option_type}</span></td><td class="fw-bold">${s.Strike}</td><td class="fw-bold">${s.vol_oi_ratio}x</td><td class="fw-bold">$${Math.round(s.Turnover).toLocaleString()}</td></tr>`;
            }).join('')}</tbody></table></div></div>`;
        }

        function renderAnalysis(c) {
            const d = stocksData[currentTicker];
            const s = d.analysis.summary;
            const cData = d.chart_data;

            // ✅ Fix: Python var `s` issue resolved by using `${s.hotspot}`
            c.innerHTML = `
            <div style="max-width: 1400px; margin: 0 auto;">
                <div class="smart-report-box"><strong>🤖 AI Smart Analysis:</strong> ${s.smart_report}</div>
                <div class="row g-3 mb-4">
                    <div class="col-md-3"><div class="kpi-card" style="border-left-color:#0d6efd"><small class="text-muted">TREND</small><h3 class="${s.net_delta>0?'text-success':'text-danger'}">${s.net_delta>0?'BULLISH':'BEARISH'}</h3></div></div>
                    <div class="col-md-3"><div class="kpi-card" style="border-left-color:#dc3545"><small class="text-muted">CALL WALL</small><h3 class="text-danger">$${s.call_wall}</h3></div></div>

                        <tbody>${d.analysis.movers.map(m => m._is_separator ? `<tr class="table-light"><td colspan="8" class="text-center small text-muted">🔻 < 1M Turnover 🔻</td></tr>` : `<tr class="${m.vol_oi_ratio>3?'row-alert-red':''}"><td><span class="${m.option_type=='CALL'?'tag-call':'tag-put'}">${m.option_type}</span></td><td class="fw-bold">${m.Strike}</td><td>${m.Expiry}</td><td>${m.Price.toFixed(2)}</td><td>${m.volume}</td><td>${m.OpenInterest}</td><td class="fw-bold">${m.vol_oi_ratio}x</td><td class="fw-bold">$${Math.round(m.Turnover).toLocaleString()}</td></tr>`).join('')}</tbody>

            </div>`;

            drawChart('oiChart', cData.labels, cData.call_oi, cData.put_oi);
            drawChart('volChart', cData.labels, cData.call_vol, cData.put_vol);
        }

        function drawChart(id, labels, cData, pData) {
            if(charts[id]) charts[id].destroy();
            const ctx = document.getElementById(id).getContext('2d');
            charts[id] = new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: [{ label: 'Calls', data: cData, backgroundColor: 'rgba(13,110,253,0.7)' }, { label: 'Puts', data: pData, backgroundColor: 'rgba(220,53,69,0.7)' }] },
                options: { responsive: true, plugins: { legend: {position:'top'} }, scales: { x: {stacked:false}, y: {beginAtZero:true} } }
            });
        }

        function renderHeatmap(c, key) {
            const d = stocksData[currentTicker][key];
            const s = stocksData[currentTicker].analysis.summary;

            if(!d || !d.data.length) { c.innerHTML = '<div class="p-5 text-center text-muted">No Data Available</div>'; return; }

            let insightHTML = '';
            if (key === 'today') insightHTML = `<div class="insight-box"><div class="insight-title">🔥 Turnover Heatmap</div><div class="insight-content">Showing where money is flowing today. <strong>Hotspot: ${s.hotspot}</strong></div></div>`;

            const rows = d.index; const cols = d.columns; const values = d.data;
            const currentPrice = parseFloat(stocksData[currentTicker].stock_agg.price || 0);
            let closestIdx = -1; let minDiff = Infinity;
            cols.forEach((s, i) => { const diff = Math.abs(parseFloat(s) - currentPrice); if (diff < minDiff) { minDiff = diff; closestIdx = i; } });
            let maxVal = 0; values.forEach(r => r.forEach(v => { if(v > maxVal) maxVal = v; }));

            let html = insightHTML + '<div class="bg-white p-3 rounded shadow-sm overflow-auto"><table class="heatmap-table table-sm table-hover mb-0"><thead class="heatmap-head"><tr><th class="expiry-cell">Exp \ Str</th>';
            cols.forEach((col, i) => {
                const cls = (i === closestIdx) ? 'header-cell closest-strike' : 'header-cell';
                const idAttr = (i === closestIdx) ? 'id="targetColumn"' : '';
                html += `<th class="${cls}" style="padding:10px; background:#f8f9fa; border:1px solid #dee2e6; text-align:center;" ${idAttr}>${col}</th>`;
            });
            html += '</tr></thead><tbody>';
            rows.forEach((expiry, rIdx) => {
                html += `<tr><td class="expiry-cell">${expiry}</td>`;
                values[rIdx].forEach((val, cIdx) => {
                    let alpha = (maxVal > 0 && val > 0) ? Math.min(1, Math.sqrt(val / maxVal)) : 0;
                    const isClosest = (cIdx === closestIdx);
                    let valStr = key === 'ratio' ? val.toFixed(2) : Math.round(val).toLocaleString();
                    html += `<td class="${isClosest?'cell-val closest-strike':'cell-val'}" style="background-color: rgba(13, 110, 253, ${alpha.toFixed(2)}); color: ${alpha>0.5?'white':'black'};" title="${val}">${valStr}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            c.innerHTML = html;
            setTimeout(() => { const t = document.getElementById('targetColumn'); if (t) t.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'center' }); }, 100);
        }

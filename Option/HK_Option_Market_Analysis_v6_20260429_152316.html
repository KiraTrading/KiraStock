        function renderTicker() { currentTicker = document.getElementById('tickerSelect').value; if (!currentTicker || !stocksData[currentTicker]) return; const agg = stocksData[currentTicker].stock_agg; const color = agg.change_pct >= 0 ? 'text-success' : 'text-danger'; document.getElementById('priceDisplay').innerHTML = `<span class="badge bg-light text-dark border fs-6 p-2">Spot: $${agg.price} <span class="${color}">(${agg.change_pct >= 0 ? '+' : ''}${agg.change_pct.toFixed(2)}%)</span></span>`; renderContent(); }
        function renderContent() { const c = document.getElementById('contentContainer'); c.innerHTML = ''; c.scrollTop = 0; if (currentTab === 'rank') renderStockRanking(c); else if (currentTab === 'scanner') renderMarketScanner(c); else if (currentTab === 'analysis') renderAnalysis(c); else renderHeatmap(c, currentTab); }
        function renderStockRanking(c) { const indicesList = ['HSI', 'HSCEI', 'HSTECH']; const indicesData = stockRanking.filter(r => indicesList.includes(r.stock)); const stocksData = stockRanking.filter(r => !indicesList.includes(r.stock)); const renderPulse = (row) => { if (!row) return ''; const sentiment = row.net_delta > 0 ? 'Bullish' : 'Bearish'; const cls = row.net_delta > 0 ? 'pulse-bull' : 'pulse-bear'; const chgColor = row.change_pct >= 0 ? 'text-success' : 'text-danger'; return `<div class="col-md-4"><div class="pulse-card ${cls}"><div class="d-flex justify-content-between align-items-center"><h5 class="fw-bold mb-0">${row.stock}</h5><div class="text-end"><span class="badge bg-light text-dark border d-block">$${row.price.toFixed(0)}</span><small class="${chgColor} fw-bold">${row.change_pct>=0?'+':''}${row.change_pct.toFixed(2)}%</small></div></div><div class="mt-3 d-flex justify-content-between"><div class="text-center"><div class="small text-muted">Trend</div><div class="fw-bold ${row.net_delta>0?'text-success':'text-danger'}">${sentiment}</div></div><div class="text-center"><div class="small text-muted">Net Delta</div><div class="fw-bold">${Math.round(row.net_delta/1000).toLocaleString()}k</div></div></div></div></div>`; }; let html = `<div style="max-width: 1400px; margin: 0 auto;"><h5 class="fw-bold mb-3 text-secondary">📊 Market Pulse</h5><div class="row mb-4">${indicesList.map(idx => renderPulse(indicesData.find(r => r.stock === idx))).join('')}</div><div class="bg-white p-4 rounded shadow-sm"><h5 class="fw-bold mb-3">📋 Market Activity</h5><div class="table-responsive"><table class="table table-hover"><thead><tr><th>Rank</th><th>Stock</th><th>Price</th><th>% Chg</th><th>Net Delta</th><th>P/C Ratio</th><th>Turnover</th></tr></thead><tbody>${stocksData.map((s,i) => `<tr><td class="text-muted">#${i+1}</td><td class="fw-bold text-primary">${s.stock}</td><td>${s.price}</td><td class="${s.change_pct>=0?'text-success':'text-danger'} fw-bold">${s.change_pct.toFixed(2)}%</td><td class="${s.net_delta>0?'text-success':'text-danger'} fw-bold">${Math.round(s.net_delta).toLocaleString()}</td><td>${s.pc_ratio_vol}</td><td class="fw-bold">$${Math.round(s.total_turnover).toLocaleString()}</td></tr>`).join('')}</tbody></table></div></div></div>`; c.innerHTML = html; }
        function renderMarketScanner(c) { const list = marketScanner; const palette = ['#E3F2FD', '#F3E5F5', '#E8F5E9', '#FBE9E7', '#E0F7FA']; const stockColorMap = {}; let colorIndex = 0; [...new Set(list.map(i => i.stock_code))].slice(0, 5).forEach(s => { stockColorMap[s] = palette[colorIndex % palette.length]; colorIndex++; }); c.innerHTML = `<div style="max-width: 1400px; margin: 0 auto;"><div class="insight-box"><div class="insight-title">🚀 Scanner Guide</div><div class="insight-content">Filters for high Vol/OI ratio > 1.0. High values (>3.0) indicate explosive interest.</div></div><h5 class="fw-bold mb-3">🚀 Unusual Activity</h5><div class="bg-white rounded shadow-sm"><table class="table table-hover"><thead><tr><th>AI Signal</th><th>Stock</th><th>Code</th><th>Type</th><th>Strike</th><th>Vol/OI</th><th>Turnover</th></tr></thead><tbody>${list.map(s => { const sColor = stockColorMap[s.stock_code] || '#f8f9fa'; return `<tr class="${s.vol_oi_ratio>3?'row-alert-red':'row-alert-yellow'}"><td>${s.ai_note}</td><td><span class="stock-badge" style="background-color: ${sColor};">${s.stock_code}</span></td><td class="small font-monospace">${s.code}</td><td><span class="${s.option_type=='CALL'?'tag-call':'tag-put'}">${s.option_type}</span></td><td class="fw-bold">${s.Strike}</td><td class="fw-bold">${s.vol_oi_ratio}x</td><td class="fw-bold">$${Math.round(s.Turnover).toLocaleString()}</td></tr>`; }).join('')}</tbody></table></div></div>`; }
        function renderAnalysis(c) { const d = stocksData[currentTicker]; const s = d.analysis.summary; const cData = d.chart_data; c.innerHTML = `<div style="max-width: 1400px; margin: 0 auto;"><div class="smart-report-box"><strong>🤖 AI Smart Analysis:</strong> ${s.smart_report}</div><div class="row g-3 mb-4"><div class="col-md-3"><div class="kpi-card" style="border-left-color:#0d6efd"><small class="text-muted">TREND</small><h3 class="${s.net_delta>0?'text-success':'text-danger'}">${s.net_delta>0?'BULLISH':'BEARISH'}</h3></div></div><div class="col-md-3"><div class="kpi-card" style="border-left-color:#dc3545"><small class="text-muted">CALL WALL</small><h3 class="text-danger">$${s.call_wall}</h3></div></div><div class="col-md-3"><div class="kpi-card" style="border-left-color:#198754"><small class="text-muted">PUT WALL</small><h3 class="text-success">$${s.put_wall}</h3></div></div><div class="col-md-3"><div class="kpi-card" style="border-left-color:#6610f2"><small class="text-muted">P/C RATIO</small><h3>${s.pc_ratio_vol}</h3></div></div></div><div class="row mb-4"><div class="col-md-6"><div class="bg-white p-3 border rounded shadow-sm"><h6 class="fw-bold text-center mb-3">🧊 Open Interest Structure</h6><canvas id="oiChart" height="200"></canvas></div></div><div class="col-md-6"><div class="bg-white p-3 border rounded shadow-sm"><h6 class="fw-bold text-center mb-3">🔥 Today's Volume Flow</h6><canvas id="volChart" height="200"></canvas></div></div></div><div class="bg-white p-3 border rounded shadow-sm"><h5 class="fw-bold mb-3">🔥 Top Movers</h5><table class="table table-hover table-sm"><thead class="table-light"><tr><th>Type</th><th>Strike</th><th>Exp</th><th>Price</th><th>Vol</th><th>OI</th><th>Vol/OI</th><th>Turnover</th></tr></thead><tbody>${d.analysis.movers.map(m => m._is_separator ? `<tr class="table-light"><td colspan="8" class="text-center small text-muted">🔻 < 1M Turnover 🔻</td></tr>` : `<tr class="${m.vol_oi_ratio>3?'row-alert-red':''}"><td><span class="${m.option_type=='CALL'?'tag-call':'tag-put'}">${m.option_type}</span></td><td class="fw-bold">${m.Strike}</td><td>${m.Expiry}</td><td>${m.Price.toFixed(2)}</td><td>${m.volume}</td><td>${m.OpenInterest}</td><td class="fw-bold">${m.vol_oi_ratio}x</td><td class="fw-bold">$${Math.round(m.Turnover).toLocaleString()}</td></tr>`).join('')}</tbody></table></div></div>`; drawChart('oiChart', cData.labels, cData.call_oi, cData.put_oi); drawChart('volChart', cData.labels, cData.call_vol, cData.put_vol); }
        function drawChart(id, labels, cData, pData) { if(charts[id]) charts[id].destroy(); charts[id] = new Chart(document.getElementById(id).getContext('2d'), { type: 'bar', data: { labels: labels, datasets: [{ label: 'Calls', data: cData, backgroundColor: 'rgba(13,110,253,0.7)' }, { label: 'Puts', data: pData, backgroundColor: 'rgba(220,53,69,0.7)' }] }, options: { responsive: true, plugins: { legend: {position:'top'} }, scales: { x: {stacked:false}, y: {beginAtZero:true} } } }); }
        function renderHeatmap(c, key) { const d = stocksData[currentTicker][key]; const s = stocksData[currentTicker].analysis.summary; if(!d || !d.data.length) { c.innerHTML = '<div class="p-5 text-center text-muted">No Data Available</div>'; return; } let insightHTML = key === 'today' ? `<div class="insight-box"><div class="insight-title">🔥 Turnover Heatmap</div><div class="insight-content">Showing where money is flowing today. <strong>Hotspot: ${s.hotspot}</strong></div></div>` : ''; const currentPrice = parseFloat(stocksData[currentTicker].stock_agg.price || 0); let closestIdx = -1; let minDiff = Infinity; d.columns.forEach((col, i) => { const diff = Math.abs(parseFloat(col) - currentPrice); if (diff < minDiff) { minDiff = diff; closestIdx = i; } }); let maxVal = 0; d.data.forEach(r => r.forEach(v => { if(v > maxVal) maxVal = v; })); let html = insightHTML + '<div class="bg-white p-3 rounded shadow-sm overflow-auto"><table class="heatmap-table table-sm table-hover mb-0"><thead class="heatmap-head"><tr><th class="expiry-cell">Exp \ Str</th>'; d.columns.forEach((col, i) => { html += `<th class="${i === closestIdx ? 'header-cell closest-strike' : 'header-cell'}" style="padding:10px; background:#f8f9fa; border:1px solid #dee2e6; text-align:center;" ${i === closestIdx ? 'id="targetColumn"' : ''}>${col}</th>`; }); html += '</tr></thead><tbody>'; d.index.forEach((expiry, rIdx) => { html += `<tr><td class="expiry-cell">${expiry}</td>`; d.data[rIdx].forEach((val, cIdx) => { let alpha = (maxVal > 0 && val > 0) ? Math.min(1, Math.sqrt(val / maxVal)) : 0; let valStr = key === 'ratio' ? val.toFixed(2) : Math.round(val).toLocaleString(); html += `<td class="${cIdx === closestIdx ? 'cell-val closest-strike' : 'cell-val'}" style="background-color: rgba(13, 110, 253, ${alpha.toFixed(2)}); color: ${alpha>0.5?'white':'black'};" title="${val}">${valStr}</td>`; }); html += '</tr>'; }); html += '</tbody></table></div>'; c.innerHTML = html; setTimeout(() => { const t = document.getElementById('targetColumn'); if (t) t.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'center' }); }, 100); }
    </script>

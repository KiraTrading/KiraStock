                    <div class="col-md-2"><div class="kpi-card border-start border-4 border-danger"><div class="kpi-title">Resistance (Call Wall)</div><div class="kpi-value">$${s.call_wall}</div></div></div>
                    <div class="col-md-2"><div class="kpi-card border-start border-4 border-success"><div class="kpi-title">Support (Put Wall)</div><div class="kpi-value">$${s.put_wall}</div></div></div>
                    <div class="col-md-3"><div class="kpi-card border-start border-4 border-info"><div class="kpi-title">P/C Ratio (Vol)</div><div class="kpi-value">${s.pc_ratio_vol}</div><div class="text-muted small">${s.pc_ratio_vol > 1 ? 'Bearish > 1.0' : 'Bullish < 1.0'}</div></div></div>
                    <div class="col-md-3"><div class="kpi-card border-start border-4 border-secondary"><div class="kpi-title">IV Skew</div><div class="kpi-value">${s.iv_skew > 0 ? '+' : ''}${s.iv_skew.toFixed(2)}%</div></div></div>
                </div>
                <div class="row mb-4">
                    <div class="col-md-6"><div class="bg-white p-3 border rounded shadow-sm"><h6 class="fw-bold text-center mb-3">🧊 Market Structure: Open Interest by Strike</h6><canvas id="oiChart" height="200"></canvas></div></div>
                    <div class="col-md-6"><div class="bg-white p-3 border rounded shadow-sm"><h6 class="fw-bold text-center mb-3">🔥 Today's Flow: Volume by Strike</h6><canvas id="volChart" height="200"></canvas></div></div>
                </div>
                <h5 class="fw-bold mb-3">🔥 Today's Top Activity</h5>
                <div class="table-responsive bg-white border rounded">
                    <table class="table table-custom mb-0"><thead><tr><th>Code</th><th>Type</th><th>Strike</th><th>Expiry</th><th>Price</th><th>Volume</th><th>OI</th><th>Vol/OI</th><th>Turnover</th></tr></thead><tbody>
                        ${data.movers.map(row => {
                            if (row._is_separator) return `<tr class="separator-row"><td colspan="9">🔻 Turnover below $1,000,000 🔻</td></tr>`;
                            const typeClass = row.option_type === 'CALL' ? 'tag-call' : 'tag-put';
                            let rowClass = row.vol_oi_ratio >= 3.0 ? 'row-alert-red' : (row.vol_oi_ratio >= 1.0 ? 'row-alert-yellow' : '');
                            return `<tr class="${rowClass}"><td class="small font-monospace">${row.code}</td><td><span class="${typeClass}">${row.option_type}</span></td><td class="fw-bold">${row.Strike}</td><td>${row.Expiry}</td><td>${row.Price.toFixed(2)}</td><td>${row.volume.toLocaleString()}</td><td>${row.OpenInterest.toLocaleString()}</td><td class="fw-bold">${row.vol_oi_ratio}x</td><td class="fw-bold">$${Math.round(row.Turnover).toLocaleString()}</td></tr>`;
                        }).join('')}
                    </tbody></table>
                </div>
            </div>`;
            container.innerHTML = html;
            renderChart('oiChart', 'Open Interest', cData.labels, cData.call_oi, cData.put_oi);
            renderChart('volChart', 'Today Volume', cData.labels, cData.call_vol, cData.put_vol);
        }

        function renderChart(canvasId, labelPrefix, labels, callData, putData) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: [ { label: 'Calls', data: callData, backgroundColor: 'rgba(13, 110, 253, 0.7)', borderColor: 'rgba(13, 110, 253, 1)', borderWidth: 1 }, { label: 'Puts', data: putData, backgroundColor: 'rgba(220, 53, 69, 0.7)', borderColor: 'rgba(220, 53, 69, 1)', borderWidth: 1 } ] },
                options: { responsive: true, interaction: { mode: 'index', intersect: false }, scales: { x: { stacked: false }, y: { beginAtZero: true } }, plugins: { legend: { position: 'top' } } }
            });
        }

        function renderHeatmap(container, tabKey) {
            const dataObj = stocksData[currentTicker][tabKey];
            const s = stocksData[currentTicker].analysis.summary;
            if (!dataObj || !dataObj.data || dataObj.data.length === 0) { container.innerHTML = '<div class="p-5 text-center text-muted">No data available.</div>'; return; }
            let insightHTML = '';
            if (tabKey === 'today') insightHTML = `<div class="insight-box"><div class="insight-title">🔥 Turnover Heatmap: Follow the Money</div><div class="insight-content">This view shows where the real money is flowing today. Dark green cells indicate heavy trading.<ul class="mb-0 mt-2 ps-3"><li><strong>Today's Hotspot:</strong> The most active contract is <span class="highlight-data">${s.hotspot}</span>.</li></ul></div></div>`;
            else if (tabKey === 'oi') insightHTML = `<div class="insight-box"><div class="insight-title">🧊 Open Interest Walls</div><div class="insight-content"><ul class="mb-0 mt-2 ps-3"><li><strong>Resistance Wall:</strong> Call Strike <span class="highlight-data">$${s.call_wall}</span>.</li><li><strong>Support Wall:</strong> Put Strike <span class="highlight-data">$${s.put_wall}</span>.</li></ul></div></div>`;
            else if (tabKey === 'ratio') insightHTML = `<div class="insight-box"><div class="insight-title">⚖️ Vol/OI Ratio</div><div class="insight-content"><ul class="mb-0 mt-2 ps-3"><li><strong>High Ratio (> 3.0x):</strong> Potential breakout signal.</li></ul></div></div>`;

            const rows = dataObj.index; const cols = dataObj.columns; const values = dataObj.data;
            const params = stocksData[currentTicker].params || {}; const currentPrice = parseFloat(params['ul_price'] || 0);
            let closestIdx = -1; let minDiff = Infinity;
            cols.forEach((s, i) => { const strikeVal = parseFloat(s); if (!isNaN(strikeVal) && currentPrice > 0) { const diff = Math.abs(strikeVal - currentPrice); if (diff < minDiff) { minDiff = diff; closestIdx = i; } } });
            let maxVal = 0; values.forEach(r => r.forEach(v => { if(v > maxVal) maxVal = v; }));

            let html = insightHTML + '<div class="p-3"><table class="heatmap-table table-sm table-hover mb-0">';
            html += '<thead class="heatmap-head"><tr><th class="expiry-cell">Expiry \ Strike</th>';
            cols.forEach((col, i) => { const isClosest = (i === closestIdx); const cls = isClosest ? 'header-cell closest-strike' : 'header-cell'; const idAttr = isClosest ? 'id="targetColumn"' : ''; html += `<th class="${cls}" style="padding:10px; background:#f8f9fa; border:1px solid #dee2e6; text-align:center;" ${idAttr}>${col}</th>`; });
            html += '</tr></thead><tbody>';
            rows.forEach((expiry, rIdx) => {
                html += `<tr><td class="expiry-cell">${expiry}</td>`;
                values[rIdx].forEach((val, cIdx) => {
                    let displayVal = val || 0; let alpha = 0; if (maxVal > 0 && displayVal > 0) alpha = Math.sqrt(displayVal / maxVal); if (alpha > 1) alpha = 1;
                    const bg = `rgba(13, 110, 253, ${alpha.toFixed(2)})`; const color = alpha > 0.5 ? 'white' : 'black'; const isClosest = (cIdx === closestIdx); const cellClass = isClosest ? 'cell-val closest-strike' : 'cell-val';
                    let valStr = Math.round(displayVal).toLocaleString(); if (tabKey === 'ratio') valStr = displayVal.toFixed(2);
                    html += `<td class="${cellClass}" style="background-color: ${bg}; color: ${color};" title="${displayVal}">${valStr}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
            setTimeout(() => { const target = document.getElementById('targetColumn'); if (target) { target.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'center' }); } }, 100);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

            currentTicker = document.getElementById('tickerSelect').value;
            if (!currentTicker || !stocksData[currentTicker]) return;
            const params = stocksData[currentTicker].params || {};
            const priceVal = params['ul_price'] || 0;
            const chgPct = stocksData[currentTicker].stock_agg ? stocksData[currentTicker].stock_agg.change_pct : 0;
            const chgColor = chgPct >= 0 ? 'text-success' : 'text-danger';

            let extraPrice = '';
            if (params.conversion_ratio && params.conversion_symbol) {
                const eqPrice = priceVal / params.conversion_ratio;
                extraPrice = `<span class="badge bg-warning text-dark ms-2" title="Futures Eq" style="font-size:1rem;">${params.conversion_symbol}: $${eqPrice.toLocaleString(undefined, {maximumFractionDigits:0})}</span>`;
            }
            document.getElementById('priceDisplay').innerHTML = `
                <span class="badge bg-light text-dark border px-3 py-2" style="font-size:1rem;">
                    Spot: <span class="text-success">$${parseFloat(priceVal).toFixed(2)}</span>
                    <span class="${chgColor} ms-2">(${chgPct >= 0 ? '+' : ''}${chgPct.toFixed(2)}%)</span>
                </span>${extraPrice}`;
            if (currentTab !== 'scanner' && currentTab !== 'rank') renderContent();
        }

        function renderContent() {
            const container = document.getElementById('contentContainer');
            container.innerHTML = ''; container.scrollTop = 0;
            if (currentTab === 'scanner') renderMarketScanner(container);
            else if (currentTab === 'rank') renderStockRanking(container);
            else if (currentTab === 'analysis') renderAnalysis(container);
            else renderHeatmap(container, currentTab);
        }

        function renderStockRanking(container) {
            const indicesList = ['SPX', 'NDX', 'DJX', 'SPY', 'QQQ'];
            const indicesData = stockRanking.filter(r => indicesList.includes(r.stock));
            const stocksData = stockRanking.filter(r => !indicesList.includes(r.stock));
            const topBulls = [...stocksData].sort((a, b) => b.net_delta - a.net_delta).slice(0, 5);
            const topBears = [...stocksData].sort((a, b) => a.net_delta - b.net_delta).slice(0, 5);

            const renderPulse = (row) => {
                if (!row) return '';
                const sentiment = row.net_delta > 0 ? 'Bullish' : 'Bearish';
                const cls = row.net_delta > 0 ? 'pulse-bull' : 'pulse-bear';
                const chgColor = row.change_pct >= 0 ? 'text-success' : 'text-danger';
                return `<div class="col-md-custom" style="width:20%;"><div class="pulse-card ${cls}"><div class="d-flex justify-content-between align-items-center"><h5 class="fw-bold mb-0">${row.stock}</h5><div class="text-end"><span class="badge bg-light text-dark border d-block">$${row.price.toFixed(0)}</span><small class="${chgColor} fw-bold">${row.change_pct >= 0 ? '+' : ''}${row.change_pct.toFixed(2)}%</small></div></div><div class="mt-3 d-flex justify-content-between"><div class="text-center"><div class="small text-muted">Sent.</div><div class="fw-bold ${row.net_delta>0?'text-success':'text-danger'}">${sentiment}</div></div><div class="text-center"><div class="small text-muted">Delta</div><div class="fw-bold">${(row.net_delta/1000).toFixed(0)}k</div></div></div></div></div>`;
            };

            let html = `<div class="p-4" style="max-width: 1400px; margin: 0 auto;">
                <h5 class="fw-bold mb-3 text-secondary">📊 US Market Pulse</h5>
                <div class="row mb-4">${indicesList.map(idx => renderPulse(indicesData.find(r => r.stock === idx))).join('')}</div>
                <div class="row">
                    <div class="col-md-6"><div class="rank-list-header text-success">🟢 Top Bullish Flow (Strongest Net Delta)</div><div class="table-responsive bg-white border rounded shadow-sm"><table class="table table-custom table-hover mb-0"><thead class="table-success"><tr><th>Stock</th><th>Price</th><th>%Chg</th><th>Net Delta</th><th>IV Skew</th><th>Call Flow</th></tr></thead><tbody>${topBulls.map(r => `<tr><td class="fw-bold">${r.stock}</td><td>$${r.price.toFixed(2)}</td><td class="${r.change_pct>=0?'text-success':'text-danger'} fw-bold">${r.change_pct>=0?'+':''}${r.change_pct.toFixed(2)}%</td><td class="text-success fw-bold">+${Math.round(r.net_delta).toLocaleString()}</td><td>${r.iv_skew.toFixed(1)}%</td><td><div class="progress" style="height: 6px;"><div class="progress-bar bg-success" style="width: ${r.call_pct}%"></div></div></td></tr>`).join('')}</tbody></table></div></div>
                    <div class="col-md-6"><div class="rank-list-header text-danger">🔴 Top Bearish Flow (Weakest Net Delta)</div><div class="table-responsive bg-white border rounded shadow-sm"><table class="table table-custom table-hover mb-0"><thead class="table-danger"><tr><th>Stock</th><th>Price</th><th>%Chg</th><th>Net Delta</th><th>IV Skew</th><th>Put Flow</th></tr></thead><tbody>${topBears.map(r => `<tr><td class="fw-bold">${r.stock}</td><td>$${r.price.toFixed(2)}</td><td class="${r.change_pct>=0?'text-success':'text-danger'} fw-bold">${r.change_pct>=0?'+':''}${r.change_pct.toFixed(2)}%</td><td class="text-danger fw-bold">${Math.round(r.net_delta).toLocaleString()}</td><td>${r.iv_skew.toFixed(1)}%</td><td><div class="progress" style="height: 6px;"><div class="progress-bar bg-danger" style="width: ${r.put_pct}%"></div></div></td></tr>`).join('')}</tbody></table></div></div>
                </div>
                <h5 class="fw-bold mt-5 mb-3 text-secondary">📋 Full Activity List</h5>
                <div class="table-responsive bg-white border rounded"><table class="table table-custom table-hover mb-0"><thead><tr><th>Rank</th><th>Stock</th><th>Price</th><th>% Change</th><th>Turnover</th><th>P/C Ratio</th><th>Net Delta</th></tr></thead><tbody>${stocksData.map((row, i) => `<tr><td class="fw-bold text-muted">#${i + 1}</td><td class="fw-bold text-primary">${row.stock}</td><td>$${row.price.toFixed(2)}</td><td class="${row.change_pct>=0?'text-success':'text-danger'} fw-bold">${row.change_pct>=0?'+':''}${row.change_pct.toFixed(2)}%</td><td class="fw-bold">$${Math.round(row.total_turnover).toLocaleString()}</td><td>${row.pc_ratio_vol}</td><td class="${row.net_delta>0?'text-success':'text-danger'} fw-bold">${Math.round(row.net_delta).toLocaleString()}</td></tr>`).join('')}</tbody></table></div></div>`;
            container.innerHTML = html;
        }

        function renderMarketScanner(container) {
            const palette = ['#E3F2FD', '#F3E5F5', '#E8F5E9', '#FBE9E7', '#E0F7FA']; 
            const stockColorMap = {}; let colorIndex = 0;
            const uniqueStocks = [...new Set(marketScanner.map(item => item.stock_code))];
            uniqueStocks.slice(0, 5).forEach(s => { stockColorMap[s] = palette[colorIndex % palette.length]; colorIndex++; });

            let html = `<div class="p-4" style="max-width: 1400px; margin: 0 auto;"><div class="insight-box"><div class="insight-title">🚀 Scanner Guide</div><div class="insight-content">Focus on Vol/OI Ratio > 3.0x.</div></div><h5 class="fw-bold mb-3">🚀 Unusual Activity</h5><div class="table-responsive bg-white border rounded"><table class="table table-custom table-hover mb-0"><thead><tr><th>AI Signal</th><th>Stock</th><th>Code</th><th>Type</th><th>Strike</th><th>Expiry</th><th>Price</th><th>Vol</th><th>OI</th><th>Vol/OI</th><th>Turnover</th></tr></thead><tbody>`;
            if (marketScanner.length === 0) html += `<tr><td colspan="11" class="text-center p-5 text-muted">No activity found.</td></tr>`;
            else {
                marketScanner.forEach(row => {
                    let rowClass = row.vol_oi_ratio >= 3.0 ? 'row-alert-red' : 'row-alert-yellow';
                    const sColor = stockColorMap[row.stock_code] || '#f8f9fa';
                    const typeClass = row.option_type === 'CALL' ? 'tag-call' : 'tag-put';
                    html += `<tr class="${rowClass}"><td class="fw-bold small text-dark" style="background:rgba(255,255,255,0.5);">${row.ai_note||'-'}</td><td><span class="stock-badge" style="background-color: ${sColor};">${row.stock_code}</span></td><td class="small font-monospace">${row.code}</td><td><span class="${typeClass}">${row.option_type}</span></td><td class="fw-bold">${row.Strike}</td><td>${row.Expiry}</td><td>${row.Price.toFixed(2)}</td><td>${row.volume.toLocaleString()}</td><td>${row.OpenInterest.toLocaleString()}</td><td class="fw-bold">${row.vol_oi_ratio}x</td><td class="fw-bold">$${Math.round(row.Turnover).toLocaleString()}</td></tr>`;
                });
            }
            html += `</tbody></table></div></div>`;
            container.innerHTML = html;
        }

        function renderAnalysis(container) {
            const stockObj = stocksData[currentTicker];
            const data = stockObj.analysis;
            const s = data.summary;
            const cData = stockObj.chart_data;
            const ratio = stockObj.params.conversion_ratio;
            const sym = stockObj.params.conversion_symbol;

            const expiries = Object.keys(data.gex_data).sort((a,b) => a === 'ALL' ? -1 : a.localeCompare(b));

            const fmtWall = (val) => {
                let base = `$${val}`;
                if (ratio && sym) base += `<br><span class="small text-muted" style="font-weight:normal">(${sym}: ${(val/ratio).toFixed(0)})</span>`;
                return base;
            };

            // Original Layout + New GEX Section inserted
            container.innerHTML = `<div class="p-4" style="max-width: 1400px; margin: 0 auto;">
                <div class="smart-report-box"><div class="smart-report-title">🤖 AI Smart Analysis</div><div class="smart-report-text">${s.smart_report}</div></div>
                <div class="row g-3 mb-4">
                    <div class="col-md-2"><div class="kpi-card border-start border-4 border-primary"><div class="kpi-title">Trend</div><div class="kpi-value" style="color: ${s.net_delta>0?'#198754':'#dc3545'}">${s.net_delta>0?'Bullish':'Bearish'}</div></div></div>
                    <div class="col-md-2"><div class="kpi-card border-start border-4 border-danger"><div class="kpi-title">Resistance (Call Wall)</div><div class="kpi-value">${fmtWall(s.call_wall)}</div></div></div>
                    <div class="col-md-2"><div class="kpi-card border-start border-4 border-success"><div class="kpi-title">Support (Put Wall)</div><div class="kpi-value">${fmtWall(s.put_wall)}</div></div></div>
                    <div class="col-md-3"><div class="kpi-card border-start border-4 border-info"><div class="kpi-title">P/C Ratio (Vol)</div><div class="kpi-value">${s.pc_ratio_vol}</div><div class="text-muted small">${s.pc_ratio_vol>1?'Bearish > 1.0':'Bullish < 1.0'}</div></div></div>
                    <div class="col-md-3"><div class="kpi-card border-start border-4 border-secondary"><div class="kpi-title">IV Skew</div><div class="kpi-value">${s.iv_skew>0?'+':''}${s.iv_skew.toFixed(2)}%</div></div></div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6"><div class="bg-white p-3 border rounded shadow-sm"><h6 class="fw-bold text-center mb-3">🧊 Open Interest Structure</h6><canvas id="oiChart" height="200"></canvas></div></div>
                    <div class="col-md-6"><div class="bg-white p-3 border rounded shadow-sm"><h6 class="fw-bold text-center mb-3">🔥 Today's Volume Flow</h6><canvas id="volChart" height="200"></canvas></div></div>
                </div>

                <div class="gex-container">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                         <h5 class="fw-bold mb-0 text-primary">⚡ Net Gamma Exposure Profile ($ Millions)</h5>
                         <select id="expirySelect" class="form-select" style="width:200px;" onchange="updateGEXChart()">
                            ${expiries.map(e => `<option value="${e}">${e === 'ALL' ? 'ALL (Aggregate)' : e}</option>`).join('')}
                         </select>
                    </div>
                    <div style="height: 300px; position: relative;">
                         <canvas id="gexChart"></canvas>
                    </div>
                    <div id="aiTextContainer" class="ai-diagnosis">Loading Analysis...</div>
                </div>
                <h5 class="fw-bold mb-3">🔥 Today's Top Activity</h5>
                <div class="table-responsive bg-white border rounded"><table class="table table-custom mb-0"><thead><tr><th>Code</th><th>Type</th><th>Strike</th><th>Expiry</th><th>Price</th><th>Volume</th><th>OI</th><th>Vol/OI</th><th>Turnover</th></tr></thead><tbody>${data.movers.map(row => {
                    if (row._is_separator) return `<tr class="separator-row"><td colspan="9">🔻 Turnover below $1,000,000 🔻</td></tr>`;
                    let strikeDisplay = row.Strike;
                    if (ratio && sym) strikeDisplay += ` <span class="small text-muted">(${(row.Strike/ratio).toFixed(0)})</span>`;
                    const typeClass = row.option_type === 'CALL' ? 'tag-call' : 'tag-put';
                    let rowClass = row.vol_oi_ratio >= 3.0 ? 'row-alert-red' : (row.vol_oi_ratio >= 1.0 ? 'row-alert-yellow' : '');
                    return `<tr class="${rowClass}"><td class="small font-monospace">${row.code}</td><td><span class="${typeClass}">${row.option_type}</span></td><td class="fw-bold">${strikeDisplay}</td><td>${row.Expiry}</td><td>${row.Price.toFixed(2)}</td><td>${row.volume.toLocaleString()}</td><td>${row.OpenInterest.toLocaleString()}</td><td class="fw-bold">${row.vol_oi_ratio}x</td><td class="fw-bold">$${Math.round(row.Turnover).toLocaleString()}</td></tr>`;
                }).join('')}</tbody></table></div></div>`;

            renderChart('oiChart', 'Open Interest', cData.labels, cData.call_oi, cData.put_oi);
            renderChart('volChart', 'Today Volume', cData.labels, cData.call_vol, cData.put_vol);
            updateGEXChart(); // Init GEX
        }

        function renderChart(id, label, labels, cData, pData) {
            new Chart(document.getElementById(id).getContext('2d'), { type: 'bar', data: { labels: labels, datasets: [{ label: 'Calls', data: cData, backgroundColor: 'rgba(13, 110, 253, 0.7)' }, { label: 'Puts', data: pData, backgroundColor: 'rgba(220, 53, 69, 0.7)' }] }, options: { responsive: true, plugins: { legend: { position: 'top' } }, scales: { x: { stacked: false }, y: { beginAtZero: true } } } });
        }

        // Window function to update GEX with annotations
        window.updateGEXChart = function() {
            const expiry = document.getElementById('expirySelect').value;
            const sData = stocksData[currentTicker].analysis;
            const gInfo = sData.gex_data[expiry];
            const chartData = gInfo.chart;
            const spot = gInfo.spot;

            // Helper to snap value to closest strike on x-axis
            const findClosest = (target) => {
                if (!chartData.strikes || chartData.strikes.length === 0) return null;
                return chartData.strikes.reduce((prev, curr) => 
                    Math.abs(curr - target) < Math.abs(prev - target) ? curr : prev
                );
            };

            // 1. AI Text Generation
            let flipNote = "";
            let regime = "";
            let regimeColor = "green";

            if (spot < gInfo.gamma_flip) {
                regime = "Negative Gamma (High Vol)";
                regimeColor = "red";
                flipNote = `市場處於 <span style="color:red; font-weight:bold;">Gamma Flip (${gInfo.gamma_flip.toFixed(0)})</span> 之下。<br>做市商傾向於<b>追漲殺跌</b>，波動率放大，容易出現加速單邊行情。`;
            } else {
                regime = "Positive Gamma (Low Vol)";
                regimeColor = "green";
                flipNote = `市場處於 <span style="color:green; font-weight:bold;">Gamma Flip (${gInfo.gamma_flip.toFixed(0)})</span> 之上。<br>做市商傾向於<b>高拋低吸</b> (Mean Reversion)，抑制波動，行情多為震盪。`;
            }

            const wallNote = `Put Wall (Supp): <b>${gInfo.put_wall}</b> | Call Wall (Res): <b>${gInfo.call_wall}</b>`;
            const hvlNote = `成交熱點 (HVL): <b>${gInfo.hvl}</b> (Breakout Zone)`;

            const aiHTML = `
                <h6 style="color:#6610f2; font-weight:bold;">🤖 GEX Analysis (${expiry})</h6>
                <div style="font-size:0.95rem; color:#333;">
                    當前價格 (Spot): <b>${spot.toFixed(2)}</b> 處於 <b style="color:${regimeColor}">${regime}</b> 區域。<br>
                    ${flipNote}<br>
                    <hr style="margin:5px 0;">
                    ${wallNote}<br>
                    ${hvlNote}
                </div>
            `;
            document.getElementById('aiTextContainer').innerHTML = aiHTML;

            // 2. Render Chart
            const ctx = document.getElementById('gexChart').getContext('2d');
            if(gexChartInstance) gexChartInstance.destroy();

            const millions = chartData.net_gex.map(v => v / 1000000); 
            const bgColors = millions.map(v => v >= 0 ? 'rgba(0, 230, 118, 0.7)' : 'rgba(255, 23, 68, 0.7)');

            // Prepare Annotations (Snap to closest strike)
            const spotX = findClosest(spot);
            const callWallX = findClosest(gInfo.call_wall);
            const putWallX = findClosest(gInfo.put_wall);
            const flipX = findClosest(gInfo.gamma_flip);
            const hvlX = findClosest(gInfo.hvl);

            gexChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: chartData.strikes,
                    datasets: [{
                        label: 'Net GEX ($M)',
                        data: millions,
                        backgroundColor: bgColors,
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        annotation: {
                            annotations: {
                                spotLine: {
                                    type: 'line', scaleID: 'x', value: spotX,
                                    borderColor: 'black', borderWidth: 2, borderDash: [5, 5],
                                    label: { content: 'Spot', display: true, position: 'start', backgroundColor: 'rgba(0,0,0,0.8)', color:'white', font: {size: 10} }
                                },
                                callWall: {
                                    type: 'line', scaleID: 'x', value: callWallX,
                                    borderColor: '#d32f2f', borderWidth: 2,
                                    label: { content: 'CW', display: true, position: 'end', backgroundColor: '#d32f2f', color:'white', font: {size: 10} }
                                },
                                putWall: {
                                    type: 'line', scaleID: 'x', value: putWallX,
                                    borderColor: '#2e7d32', borderWidth: 2,
                                    label: { content: 'PW', display: true, position: 'end', backgroundColor: '#2e7d32', color:'white', font: {size: 10} }
                                },
                                flipLine: {
                                    type: 'line', scaleID: 'x', value: flipX,
                                    borderColor: '#6610f2', borderWidth: 2, borderDash: [2, 2],
                                    label: { content: 'Flip', display: true, position: 'start', yAdjust: 20, backgroundColor: '#6610f2', color:'white', font: {size: 10} }
                                },
                                hvlLine: {
                                    type: 'line', scaleID: 'x', value: hvlX,
                                    borderColor: '#ff9800', borderWidth: 2, borderDash: [2, 2],
                                    label: { content: 'HVL', display: true, position: 'start', yAdjust: -20, backgroundColor: '#ff9800', color:'black', font: {size: 10} }
                                }
                            }
                        },
                        tooltip: {
                            callbacks: { label: (ctx) => `Net GEX: ${ctx.raw.toFixed(2)} M` }
                        }
                    },
                    scales: {
                        x: { grid: { display: false } },
                        y: { beginAtZero: true }
                    }
                }
            });
        };

        function renderHeatmap(container, tabKey) {
            const dataObj = stocksData[currentTicker][tabKey];
            const s = stocksData[currentTicker].analysis.summary;
            const ratio = stocksData[currentTicker].params.conversion_ratio;
            const sym = stocksData[currentTicker].params.conversion_symbol;

            if (!dataObj || !dataObj.data || dataObj.data.length === 0) { container.innerHTML = '<div class="p-5 text-center text-muted">No data available.</div>'; return; }

            const rows = dataObj.index; const cols = dataObj.columns; const values = dataObj.data;
            const currentPrice = parseFloat(stocksData[currentTicker].params['ul_price'] || 0);
            let closestIdx = -1; let minDiff = Infinity;
            cols.forEach((s, i) => { const diff = Math.abs(parseFloat(s) - currentPrice); if (diff < minDiff) { minDiff = diff; closestIdx = i; } });
            let maxVal = 0; values.forEach(r => r.forEach(v => { if(v > maxVal) maxVal = v; }));

            let html = '<div class="p-3"><table class="heatmap-table table-sm table-hover mb-0"><thead class="heatmap-head"><tr><th class="expiry-cell">Expiry \ Strike</th>';
            cols.forEach((col, i) => {
                let label = col;
                if (ratio && sym) label += `<br><span class="small text-muted" style="font-weight:normal">(${(col/ratio).toFixed(0)})</span>`;
                const cls = (i === closestIdx) ? 'header-cell closest-strike' : 'header-cell';
                const idAttr = (i === closestIdx) ? 'id="targetColumn"' : '';
                html += `<th class="${cls}" style="padding:10px; background:#f8f9fa; border:1px solid #dee2e6; text-align:center;" ${idAttr}>${label}</th>`;
            });
            html += '</tr></thead><tbody>';
            rows.forEach((expiry, rIdx) => {
                html += `<tr><td class="expiry-cell">${expiry}</td>`;
                values[rIdx].forEach((val, cIdx) => {
                    let alpha = (maxVal > 0 && val > 0) ? Math.min(1, Math.sqrt(val / maxVal)) : 0;
                    const isClosest = (cIdx === closestIdx);
                    let valStr = tabKey === 'ratio' ? val.toFixed(2) : Math.round(val).toLocaleString();
                    html += `<td class="${isClosest?'cell-val closest-strike':'cell-val'}" style="background-color: rgba(13, 110, 253, ${alpha.toFixed(2)}); color: ${alpha>0.5?'white':'black'};" title="${val}">${valStr}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
            setTimeout(() => { const t = document.getElementById('targetColumn'); if (t) t.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'center' }); }, 100);
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
